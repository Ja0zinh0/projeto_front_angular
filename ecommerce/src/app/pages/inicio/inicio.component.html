<!-- Carrossel Bootstrap -->
<div id="carouselExampleIndicators" class="carousel slide mb-5" data-bs-ride="carousel">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=1200&h=400&q=80" class="d-block w-100" alt="Banner 1" style="object-fit: cover; height: 400px;">
      <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
        <h5>Promoção de Verão</h5>
        <p>Aproveite os melhores preços em tecnologia.</p>
      </div>
    </div>
    <div class="carousel-item">
      <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1200&h=400&q=80" class="d-block w-100" alt="Banner 2" style="object-fit: cover; height: 400px;">
      <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded">
        <h5>Novidades em Hardware</h5>
        <p>Monte o setup dos seus sonhos.</p>
      </div>
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Anterior</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Próximo</span>
  </button>
</div>

<!-- Produtos Angular Material -->
<div class="container mb-5">
  <h2 class="text-center mb-4">Nossos Produtos</h2>
  <div class="row g-4">
    <div class="col-12 col-md-6 col-lg-3" *ngFor="let produto of produtos">
      <mat-card class="h-100 d-flex flex-column">
        <img mat-card-image [src]="produto.imagem" [alt]="produto.nome" style="height: 200px; object-fit: cover;">
        <mat-card-header>
          <mat-card-title>{{ produto.nome }}</mat-card-title>
        </mat-card-header>
        <mat-card-content class="flex-grow-1 mt-2">
          <p>{{ produto.descricao }}</p>
          <h3 class="text-primary fw-bold">
            {{ produto.preco | currency:'BRL':'symbol':'1.2-2' }}
          </h3>
        </mat-card-content>
        <mat-card-actions class="d-flex justify-content-center pb-3">
          <button mat-raised-button color="accent" class="w-100 mx-2">Comprar</button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
</div>
